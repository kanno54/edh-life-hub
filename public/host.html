<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDH Life Hub - 親機モニター</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="justify-content: flex-start; padding: 2rem 0;">
  <div class="host-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
      <div>
        <h1 style="font-size: 2rem;">EDH Life Hub</h1>
        <p style="margin-bottom: 0;">親機モニター（ゲーム画面）</p>
      </div>
      
      <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
        <!-- 参加人数切替 -->
        <label style="font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem;">
          参加人数:
          <select id="playerCountSelect" class="select-count" onchange="changePlayerCount(this.value)">
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4" selected>4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
          </select>
        </label>

        <button class="btn btn-danger" onclick="triggerReset()" style="width: auto; padding: 0.4rem 0.9rem; font-size: 0.85rem; border-radius: 10px;">
          ゲームリセット
        </button>

        <div class="connection-status" style="position: static;">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">接続中...</span>
        </div>
      </div>
    </div>

    <!-- 先攻プレイヤー強調表示エリア -->
    <div id="firstPlayerBanner" style="display: none; justify-content: center; align-items: center; margin-bottom: 0.5rem;">
      <div class="first-player-badge" style="font-size: 0.9rem; padding: 0.4rem 1.2rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg>
        先攻プレイヤー: <span id="firstPlayerName">Player 1</span>
      </div>
    </div>

    <!-- 動的プレイヤーカードグリッド -->
    <div class="host-grid" id="hostGrid"></div>

    <!-- ログパネル -->
    <div class="log-panel">
      <div class="log-title">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        ライフ変更履歴
      </div>
      <ul class="log-list" id="logList"></ul>
    </div>
    
    <div style="text-align: center; margin-top: 1rem;">
      <a href="index.html" class="btn btn-secondary" style="width: auto; padding: 0.75rem 1.5rem;">エントランスに戻る</a>
    </div>
  </div>

  <!-- 統率者カード詳細表示用モーダル -->
  <div id="cardModalBackdrop" class="card-modal-backdrop" onclick="closeCardModal(event)">
    <div class="card-modal-content" onclick="event.stopPropagation()">
      <button class="card-modal-close" onclick="closeCardModal()">&times;</button>
      <img id="modalCardImg" class="card-modal-img" src="" alt="Commander Card">
      <div class="card-modal-details">
        <div id="modalCardTitle" class="card-modal-title">統率者カード名</div>
        <div id="modalCardType" class="card-modal-type">タイプ行</div>
        <div id="modalCardText" class="card-modal-text-box">カードテキスト</div>
      </div>
    </div>
  </div>

  <script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    const ws = new WebSocket(wsUrl);

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const logList = document.getElementById('logList');
    const hostGrid = document.getElementById('hostGrid');
    const playerCountSelect = document.getElementById('playerCountSelect');
    const firstPlayerBanner = document.getElementById('firstPlayerBanner');
    const firstPlayerName = document.getElementById('firstPlayerName');

    let gameState = {
      activePlayerCount: 4,
      firstPlayerId: 1,
      players: {}
    };

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'オンライン';
      addLogSystem('システム', 'WebSocket サーバーに接続しました。');
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'オフライン';
      addLogSystem('システム', 'サーバーとの接続が切れました。');
      setTimeout(() => { window.location.reload(); }, 3000);
    };

    ws.onmessage = (event) => {
      const message = JSON.parse(event.data);

      if (message.type === 'init') {
        gameState = message.state;
        playerCountSelect.value = gameState.activePlayerCount;
        renderAll();
        
        const fpName = gameState.players[gameState.firstPlayerId]?.name || `Player ${gameState.firstPlayerId}`;
        addLogSystem('ゲーム開始', `対戦がセットアップされました。（先攻: ${fpName}）`);
      } else if (message.type === 'update') {
        const { playerId, field, value, subPlayerId } = message;
        if (!gameState.players[playerId]) return;

        const oldName = gameState.players[playerId].name;
        const formattedTime = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        if (field === 'life') {
          const oldLife = gameState.players[playerId].life;
          gameState.players[playerId].life = value;
          updateLifeUI(playerId, oldLife, value);
          
          const diff = value - oldLife;
          const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
          addLogItem(oldName, `ライフが ${oldLife} から ${value} に変更されました (${diffStr})`, formattedTime);
        } 
        else if (field === 'name') {
          gameState.players[playerId].name = value;
          const nameEl = document.getElementById(`name-${playerId}`);
          if (nameEl) nameEl.textContent = value;
          
          updateCommanderDamageLabels(playerId, value);
          if (gameState.firstPlayerId === playerId) {
            firstPlayerName.textContent = value;
          }
          addLogItem(oldName, `プレイヤー名が 「${value}」 に変更されました。`, formattedTime);
        } 
        else if (field === 'poison') {
          const oldPoison = gameState.players[playerId].poison;
          gameState.players[playerId].poison = value;
          updatePoisonUI(playerId, value);
          addLogItem(oldName, `毒カウンターが ${oldPoison} から ${value} に変更されました。`, formattedTime);
        } 
        else if (field === 'commanderInfo') {
          gameState.players[playerId].commanderInfo = value;
          updateCommanderInfoUI(playerId, value);
          const cmdName = value ? value.name : 'なし';
          addLogItem(oldName, `統率者カードが 「${cmdName}」 に設定されました。`, formattedTime);
        }
        else if (field === 'commanderDamage') {
          const oldDamage = gameState.players[playerId].commanderDamage[subPlayerId];
          gameState.players[playerId].commanderDamage[subPlayerId] = value;
          updateCommanderDamageUI(playerId, subPlayerId, value);
          
          const opponentName = gameState.players[subPlayerId]?.name || `Player ${subPlayerId}`;
          addLogItem(oldName, `${opponentName} の統率者ダメージを ${oldDamage} から ${value} に変更しました。`, formattedTime);
        }

        checkDefeat(playerId);
      }
    };

    function triggerReset() {
      if (confirm('ゲーム状態をリセットしますか？（先攻プレイヤーが再選出されます）')) {
        ws.send(JSON.stringify({ type: 'reset' }));
      }
    }

    function changePlayerCount(count) {
      if (confirm(`参加人数を ${count} 人に変更してゲームをリセットしますか？`)) {
        ws.send(JSON.stringify({
          type: 'set_player_count',
          count: parseInt(count, 10)
        }));
      } else {
        playerCountSelect.value = gameState.activePlayerCount;
      }
    }

    function renderAll() {
      const count = gameState.activePlayerCount;
      hostGrid.className = `host-grid grid-count-${count}`;
      hostGrid.innerHTML = '';

      // 先攻プレイヤーのバナー
      const fpId = gameState.firstPlayerId;
      const fpName = gameState.players[fpId]?.name || `Player ${fpId}`;
      firstPlayerName.textContent = fpName;
      firstPlayerBanner.style.display = 'flex';

      // 全プレイヤーカードを動的に構築
      for (let i = 1; i <= count; i++) {
        const p = gameState.players[i];
        if (!p) continue;

        const isFirst = (i === fpId);

        const card = document.createElement('div');
        card.className = `player-card player-${((i - 1) % 4) + 1} ${isFirst ? 'first-player' : ''}`;
        card.id = `card-${i}`;

        // 統率者ダメージのバッジ部分の生成
        let cmdHtml = '';
        let cmdCols = count - 1;
        let colClass = cmdCols >= 4 ? `cols-${cmdCols}` : '';

        for (let j = 1; j <= count; j++) {
          if (i !== j) {
            const oppName = gameState.players[j]?.name || `Player ${j}`;
            const dmgVal = p.commanderDamage[j] || 0;
            cmdHtml += `
              <div class="cmd-damage-badge" id="cmd-badge-${i}-${j}">
                <div class="cmd-damage-label" id="cmd-label-${i}-${j}">vs ${oppName}</div>
                <div class="cmd-damage-val" id="cmd-val-${i}-${j}">${dmgVal}</div>
              </div>
            `;
          }
        }

        const cmdInfo = p.commanderInfo;
        const hasCmd = cmdInfo && cmdInfo.name;

        card.innerHTML = `
          ${isFirst ? '<div class="first-player-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg> FIRST PLAYER</div>' : ''}
          <div class="player-name" id="name-${i}">${p.name}</div>
          
          <!-- 統率者バッジ (親機) -->
          <div class="commander-badge" id="cmd-badge-player-${i}" style="${hasCmd ? 'display: inline-flex;' : 'display: none;'}" onclick="openCommanderModalFromHost(${i})">
            <img class="commander-thumb" id="cmd-thumb-player-${i}" src="${hasCmd ? cmdInfo.imageUrl : ''}" alt="">
            <span class="commander-badge-name" id="cmd-name-player-${i}">${hasCmd ? cmdInfo.name : ''}</span>
          </div>

          <div class="player-life" id="life-${i}">${p.life}</div>
          
          <div class="poison-display" id="poison-box-${i}" style="${p.poison > 0 ? 'display: flex;' : 'display: none;'}">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            Poison: <span id="poison-${i}">${p.poison}</span>
          </div>

          <div class="commander-damage-container ${colClass}">
            ${cmdHtml}
          </div>
        `;

        hostGrid.appendChild(card);
        checkDefeat(i);
      }
    }

    function updateLifeUI(playerId, oldLife, newLife) {
      const el = document.getElementById(`life-${playerId}`);
      if (!el) return;
      el.textContent = newLife;
      el.classList.remove('life-up', 'life-down');
      void el.offsetWidth;

      if (newLife > oldLife) {
        el.classList.add('life-up');
      } else if (newLife < oldLife) {
        el.classList.add('life-down');
      }
    }

    function updatePoisonUI(playerId, value) {
      const box = document.getElementById(`poison-box-${playerId}`);
      const val = document.getElementById(`poison-${playerId}`);
      if (!box || !val) return;
      
      val.textContent = value;
      if (value > 0) {
        box.style.display = 'flex';
        box.classList.add('active');
      } else {
        box.style.display = 'none';
        box.classList.remove('active');
      }
    }

    function updateCommanderInfoUI(playerId, info) {
      const badge = document.getElementById(`cmd-badge-player-${playerId}`);
      const thumb = document.getElementById(`cmd-thumb-player-${playerId}`);
      const name = document.getElementById(`cmd-name-player-${playerId}`);

      if (!badge || !name || !thumb) return;

      if (info && info.name) {
        name.textContent = info.name;
        if (info.imageUrl) {
          thumb.src = info.imageUrl;
          thumb.style.display = 'block';
        } else {
          thumb.style.display = 'none';
        }
        badge.style.display = 'inline-flex';
      } else {
        badge.style.display = 'none';
      }
    }

    function openCommanderModalFromHost(playerId) {
      if (!gameState.players[playerId]) return;
      const info = gameState.players[playerId].commanderInfo;
      if (info) {
        showCardModal(info);
      }
    }

    function showCardModal(info) {
      const cardModalBackdrop = document.getElementById('cardModalBackdrop');
      const modalCardImg = document.getElementById('modalCardImg');
      const modalCardTitle = document.getElementById('modalCardTitle');
      const modalCardType = document.getElementById('modalCardType');
      const modalCardText = document.getElementById('modalCardText');

      modalCardTitle.textContent = info.name || '不明なカード';
      modalCardType.textContent = info.typeLine || '';
      modalCardText.textContent = info.text || '能力テキストはありません。';
      if (info.imageUrl) {
        modalCardImg.src = info.imageUrl;
        modalCardImg.style.display = 'block';
      } else {
        modalCardImg.style.display = 'none';
      }
      cardModalBackdrop.classList.add('active');
    }

    function closeCardModal(e) {
      const cardModalBackdrop = document.getElementById('cardModalBackdrop');
      if (e && e.target !== cardModalBackdrop && !e.target.classList.contains('card-modal-close')) return;
      cardModalBackdrop.classList.remove('active');
    }

    function updateCommanderDamageLabels(playerId, newName) {
      const count = gameState.activePlayerCount;
      for (let i = 1; i <= count; i++) {
        if (i !== playerId) {
          const label = document.getElementById(`cmd-label-${i}-${playerId}`);
          if (label) label.textContent = `vs ${newName}`;
        }
      }
    }

    function updateCommanderDamageUI(playerId, subPlayerId, value) {
      const badge = document.getElementById(`cmd-badge-${playerId}-${subPlayerId}`);
      const val = document.getElementById(`cmd-val-${playerId}-${subPlayerId}`);
      if (!badge || !val) return;

      val.textContent = value;
      if (value >= 21) {
        badge.className = 'cmd-damage-badge warning';
      } else if (value >= 15) {
        badge.className = 'cmd-damage-badge';
        badge.style.borderColor = 'var(--accent-amber)';
        badge.style.color = 'var(--accent-amber)';
      } else {
        badge.className = 'cmd-damage-badge';
        badge.style.borderColor = '';
        badge.style.color = '';
      }
    }

    function checkDefeat(playerId) {
      const p = gameState.players[playerId];
      const card = document.getElementById(`card-${playerId}`);
      if (!p || !card) return;

      let isDefeated = false;
      if (p.life <= 0) isDefeated = true;
      if (p.poison >= 10) isDefeated = true;
      if (p.commanderDamage) {
        for (const dmg of Object.values(p.commanderDamage)) {
          if (dmg >= 21) {
            isDefeated = true;
            break;
          }
        }
      }

      if (isDefeated) {
        card.classList.add('defeated');
      } else {
        card.classList.remove('defeated');
      }
    }

    function addLogItem(player, text, time) {
      const li = document.createElement('li');
      li.className = 'log-item';
      li.innerHTML = `
        <span style="font-weight: 600; color: var(--accent-cyan);">${player}</span>
        <span style="color: var(--text-main); flex-grow: 1; margin-left: 1rem;">${text}</span>
        <span style="color: var(--text-muted); font-size: 0.8rem; margin-left: 1rem;">${time}</span>
      `;
      logList.appendChild(li);
      while (logList.children.length > 20) {
        logList.removeChild(logList.firstChild);
      }
      const logPanel = document.querySelector('.log-panel');
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function addLogSystem(tag, text) {
      const formattedTime = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const li = document.createElement('li');
      li.className = 'log-item';
      li.style.borderLeftColor = 'var(--text-muted)';
      li.innerHTML = `
        <span style="font-weight: 600; color: var(--text-muted);">${tag}</span>
        <span style="color: var(--text-muted); flex-grow: 1; margin-left: 1rem;">${text}</span>
        <span style="color: var(--text-muted); font-size: 0.8rem; margin-left: 1rem;">${formattedTime}</span>
      `;
      logList.appendChild(li);
    }
  </script>
</body>
</html>
