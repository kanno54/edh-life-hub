<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDH Life Hub - 子機コントローラー</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="client-container">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; position: relative;">
      <div>
        <h1 style="font-size: 1.8rem; margin-bottom: 0;">EDH Life Hub</h1>
      </div>
      <div class="connection-status" style="position: static;">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">接続中...</span>
      </div>
    </div>

    <!-- プレイヤー選択画面 (初期状態) -->
    <div id="selectionScreen" class="card" style="width: 100%; max-width: 100%;">
      <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">プレイヤーを選択</h2>
      <p style="margin-bottom: 1.5rem;" id="selectionSubText">操作する自分のプレイヤー枠を選択してください。</p>
      
      <div class="selector-grid" id="selectorGrid">
        <!-- JSで動的にボタン生成 -->
      </div>
    </div>

    <!-- コントローラー画面 (非表示) -->
    <div id="controllerScreen" class="counter-layout" style="display: none;">
      <div id="playerTag" class="current-player-tag">Player 1</div>
      
      <!-- プレイヤー名入力 -->
      <input type="text" id="nameInput" class="input-name" placeholder="プレイヤー名を入力" onchange="sendNameUpdate()" onkeyup="if(event.key === 'Enter') this.blur()">

      <!-- 統率者カード設定 -->
      <div style="width: 100%; margin-bottom: 1.5rem;">
        <div style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.5rem; text-align: left; display: flex; justify-content: space-between; align-items: center;">
          <span>⚔️ 統率者カード</span>
          <span id="searchStatus" style="font-size: 0.75rem; color: var(--accent-cyan);"></span>
        </div>
        <div class="commander-input-group">
          <input type="text" id="commanderInput" class="input-commander" placeholder="カード名を入力 (例: アトラクサ)" onkeyup="if(event.key === 'Enter') handleSearchCommander()">
          <button class="btn-search-commander" onclick="handleSearchCommander()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            登録
          </button>
        </div>
        
        <!-- 登録済み統率者バッジ -->
        <div id="registeredCommanderBadgeArea" style="display: none; justify-content: space-between; align-items: center; width: 100%; margin-top: 0.5rem;">
          <div id="clientCommanderBadge" class="commander-badge" onclick="openCommanderModalFromClient()">
            <img id="clientCmdThumb" class="commander-thumb" src="" alt="Card Thumbnail">
            <span id="clientCmdName" class="commander-badge-name"></span>
          </div>
          <button class="btn-clear-commander" onclick="clearCommander()">登録解除</button>
        </div>
      </div>

      <!-- ライフカウンター -->
      <div id="lifeDisplay" class="client-life-display">40</div>

      <div class="control-pad">
        <button class="pad-btn plus" onclick="changeLife(1)">+1</button>
        <button class="pad-btn plus" onclick="changeLife(5)">+5</button>
        <button class="pad-btn minus" onclick="changeLife(-1)">-1</button>
        <button class="pad-btn minus" onclick="changeLife(-5)">-5</button>
      </div>

      <!-- 毒・統率者ダメージ操作（アコーディオン） -->
      <div class="accordion">
        <div class="accordion-header" id="accordionHeader" onclick="toggleAccordion()">
          <span>毒・統率者ダメージ操作</span>
          <svg id="accordionArrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="transition: transform 0.3s;"><path d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div class="accordion-content" id="accordionContent">
          <!-- 毒カウンター操作 -->
          <div class="sub-control-row" style="border-bottom: 1px solid var(--bg-card-border); padding-bottom: 1rem; margin-bottom: 1rem;">
            <span class="sub-control-label" style="color: var(--accent-emerald);">毒カウンター</span>
            <div class="sub-control-btns">
              <button class="btn-small-pad" onclick="changePoison(-1)" style="color: var(--accent-rose);">-</button>
              <span class="sub-control-val" id="poisonDisplay" style="color: var(--accent-emerald);">0</span>
              <button class="btn-small-pad" onclick="changePoison(1)" style="color: var(--accent-emerald);">+</button>
            </div>
          </div>
          
          <!-- 統率者ダメージ操作 -->
          <div id="commanderDamagePanel"></div>
        </div>
      </div>

      <button class="btn btn-secondary" onclick="resetSelection()">プレイヤー変更</button>
    </div>

    <div style="text-align: center; margin-top: 1rem;">
      <a href="index.html" class="btn btn-secondary" style="width: auto; padding: 0.75rem 1.5rem;">エントランスに戻る</a>
    </div>
  </div>

  <!-- 統率者カード詳細表示用モーダル -->
  <div id="cardModalBackdrop" class="card-modal-backdrop" onclick="closeCardModal(event)">
    <div class="card-modal-content" onclick="event.stopPropagation()">
      <button class="card-modal-close" onclick="closeCardModal()">&times;</button>
      <img id="modalCardImg" class="card-modal-img" src="" alt="Commander Card">
      <div class="card-modal-details">
        <div id="modalCardTitle" class="card-modal-title">統率者カード名</div>
        <div id="modalCardType" class="card-modal-type">タイプ行</div>
        <div id="modalCardText" class="card-modal-text-box">カードテキスト</div>
      </div>
    </div>
  </div>

  <script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    const ws = new WebSocket(wsUrl);

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const selectionScreen = document.getElementById('selectionScreen');
    const controllerScreen = document.getElementById('controllerScreen');
    const selectorGrid = document.getElementById('selectorGrid');
    const playerTag = document.getElementById('playerTag');
    const nameInput = document.getElementById('nameInput');
    const lifeDisplay = document.getElementById('lifeDisplay');
    const poisonDisplay = document.getElementById('poisonDisplay');
    const commanderDamagePanel = document.getElementById('commanderDamagePanel');

    const commanderInput = document.getElementById('commanderInput');
    const searchStatus = document.getElementById('searchStatus');
    const registeredCommanderBadgeArea = document.getElementById('registeredCommanderBadgeArea');
    const clientCmdThumb = document.getElementById('clientCmdThumb');
    const clientCmdName = document.getElementById('clientCmdName');

    const cardModalBackdrop = document.getElementById('cardModalBackdrop');
    const modalCardImg = document.getElementById('modalCardImg');
    const modalCardTitle = document.getElementById('modalCardTitle');
    const modalCardType = document.getElementById('modalCardType');
    const modalCardText = document.getElementById('modalCardText');

    let selectedPlayerId = null;
    let gameState = {
      activePlayerCount: 4,
      firstPlayerId: 1,
      players: {}
    };

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'オンライン';
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'オフライン';
      setTimeout(() => { window.location.reload(); }, 3000);
    };

    ws.onmessage = (event) => {
      const message = JSON.parse(event.data);

      if (message.type === 'init') {
        gameState = message.state;
        
        if (selectedPlayerId && selectedPlayerId > gameState.activePlayerCount) {
          resetSelection();
        }

        renderSelectionGrid();
        updateUI();
      } else if (message.type === 'update') {
        const { playerId, field, value, subPlayerId } = message;
        if (!gameState.players[playerId]) return;

        if (field === 'life') {
          gameState.players[playerId].life = value;
        } else if (field === 'name') {
          gameState.players[playerId].name = value;
          if (selectedPlayerId && playerId !== selectedPlayerId) {
            const labelEl = document.getElementById(`cmd-label-${playerId}`);
            if (labelEl) labelEl.textContent = `vs ${value}`;
          }
          renderSelectionGrid();
        } else if (field === 'poison') {
          gameState.players[playerId].poison = value;
        } else if (field === 'commanderInfo') {
          gameState.players[playerId].commanderInfo = value;
        } else if (field === 'commanderDamage') {
          if (gameState.players[playerId].commanderDamage) {
            gameState.players[playerId].commanderDamage[subPlayerId] = value;
          }
        }

        updateUI();
      }
    };

    function renderSelectionGrid() {
      selectorGrid.innerHTML = '';
      const count = gameState.activePlayerCount || 4;
      const fpId = gameState.firstPlayerId;

      for (let i = 1; i <= count; i++) {
        const p = gameState.players[i];
        const pName = p?.name || `Player ${i}`;
        const isFirst = (i === fpId);

        const btn = document.createElement('button');
        btn.className = `selector-btn selector-${((i - 1) % 4) + 1}`;
        btn.innerHTML = `${isFirst ? '👑 ' : ''}${pName}`;
        btn.onclick = () => selectPlayer(i);

        selectorGrid.appendChild(btn);
      }
    }

    function selectPlayer(id) {
      selectedPlayerId = id;
      
      const isFirst = (id === gameState.firstPlayerId);
      playerTag.className = `current-player-tag tag-${((id - 1) % 4) + 1}`;
      playerTag.innerHTML = `${isFirst ? '👑 先攻 / ' : ''}Player ${id}`;

      selectionScreen.style.display = 'none';
      controllerScreen.style.display = 'flex';

      if (gameState.players[id]) {
        nameInput.value = gameState.players[id].name;
      }

      buildCommanderDamagePanel();
      updateUI();
    }

    function resetSelection() {
      selectedPlayerId = null;
      selectionScreen.style.display = 'block';
      controllerScreen.style.display = 'none';
      
      const content = document.getElementById('accordionContent');
      const header = document.getElementById('accordionHeader');
      const arrow = document.getElementById('accordionArrow');
      content.classList.remove('open');
      header.classList.remove('active');
      arrow.style.transform = '';
    }

    function sendNameUpdate() {
      if (!selectedPlayerId) return;
      const newName = nameInput.value.trim() || `Player ${selectedPlayerId}`;
      sendUpdate('name', newName);
    }

    function changeLife(amount) {
      if (!selectedPlayerId || !gameState.players[selectedPlayerId]) return;
      const currentLife = gameState.players[selectedPlayerId].life;
      const newLife = Math.max(0, currentLife + amount);
      
      gameState.players[selectedPlayerId].life = newLife;
      updateUI();
      sendUpdate('life', newLife);
    }

    function changePoison(amount) {
      if (!selectedPlayerId || !gameState.players[selectedPlayerId]) return;
      const currentPoison = gameState.players[selectedPlayerId].poison;
      const newPoison = Math.max(0, currentPoison + amount);

      gameState.players[selectedPlayerId].poison = newPoison;
      updateUI();
      sendUpdate('poison', newPoison);
    }

    function changeCommanderDamage(subPlayerId, amount) {
      if (!selectedPlayerId || !gameState.players[selectedPlayerId]) return;
      const currentDmg = gameState.players[selectedPlayerId].commanderDamage[subPlayerId] || 0;
      const newDmg = Math.max(0, currentDmg + amount);
      const actualDiff = newDmg - currentDmg;

      if (actualDiff !== 0) {
        gameState.players[selectedPlayerId].commanderDamage[subPlayerId] = newDmg;
        
        // ライフ自動連動
        const currentLife = gameState.players[selectedPlayerId].life;
        const newLife = Math.max(0, currentLife - actualDiff);
        gameState.players[selectedPlayerId].life = newLife;

        updateUI();
        sendUpdate('commanderDamage', newDmg, subPlayerId);
        sendUpdate('life', newLife);
      }
    }

    function sendUpdate(field, value, subPlayerId = null) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'update',
          playerId: selectedPlayerId,
          field,
          value,
          subPlayerId
        }));
      }
    }

    function updateUI() {
      if (!selectedPlayerId || !gameState.players[selectedPlayerId]) return;

      const p = gameState.players[selectedPlayerId];
      lifeDisplay.textContent = p.life;
      poisonDisplay.textContent = p.poison;

      // 統率者情報の表示更新
      if (p.commanderInfo && p.commanderInfo.name) {
        registeredCommanderBadgeArea.style.display = 'flex';
        clientCmdName.textContent = p.commanderInfo.name;
        if (p.commanderInfo.imageUrl) {
          clientCmdThumb.src = p.commanderInfo.imageUrl;
          clientCmdThumb.style.display = 'block';
        } else {
          clientCmdThumb.style.display = 'none';
        }
      } else {
        registeredCommanderBadgeArea.style.display = 'none';
      }

      if (p.commanderDamage) {
        for (const [subId, val] of Object.entries(p.commanderDamage)) {
          const valEl = document.getElementById(`cmd-val-${subId}`);
          if (valEl) valEl.textContent = val;
        }
      }

      // 対戦相手の統率者バッジを含むパネルを最新化
      buildCommanderDamagePanel();
    }

    async function handleSearchCommander() {
      if (!selectedPlayerId) return;
      const query = commanderInput.value.trim();
      if (!query) return;

      searchStatus.textContent = '検索中...';
      const info = await fetchScryfallCommander(query);
      searchStatus.textContent = '';

      if (info) {
        gameState.players[selectedPlayerId].commanderInfo = info;
        updateUI();
        sendUpdate('commanderInfo', info);
        commanderInput.value = '';
      } else {
        alert(`「${query}」に一致する統率者カードが見つかりませんでした。`);
      }
    }

    function clearCommander() {
      if (!selectedPlayerId) return;
      gameState.players[selectedPlayerId].commanderInfo = null;
      updateUI();
      sendUpdate('commanderInfo', null);
    }

    async function fetchScryfallCommander(cardName) {
      try {
        const query = cardName.trim();
        const headers = { 'Accept': 'application/json' };

        // 1. 日本語カード優先検索 (lang:ja)
        let url = `https://api.scryfall.com/cards/search?q=lang%3Aja+${encodeURIComponent(query)}`;
        let res = await fetch(url, { headers });
        let data = await res.json();

        let card = null;
        if (res.ok && data.data && data.data.length > 0) {
          card = data.data[0];
        } else {
          // 2. 言語不問の通常検索 (英語・別言語含む)
          url = `https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`;
          res = await fetch(url, { headers });
          data = await res.json();

          if (res.ok && data.data && data.data.length > 0) {
            card = data.data[0];
          } else {
            // 3. fuzzy 検索フォールバック
            url = `https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(query)}`;
            res = await fetch(url, { headers });
            if (res.ok) {
              card = await res.json();
            }
          }
        }

        if (!card) return null;

        let imageUrl = '';
        if (card.image_uris && card.image_uris.normal) {
          imageUrl = card.image_uris.normal;
        } else if (card.card_faces && card.card_faces[0] && card.card_faces[0].image_uris) {
          imageUrl = card.card_faces[0].image_uris.normal;
        }

        let text = card.printed_text || card.oracle_text || '';
        if (!text && card.card_faces) {
          text = card.card_faces.map(f => `${f.printed_name || f.name}:\n${f.printed_text || f.oracle_text || ''}`).join('\n\n');
        }

        return {
          name: card.printed_name || card.name,
          oracleName: card.name,
          imageUrl: imageUrl,
          typeLine: card.printed_type_line || card.type_line || '',
          text: text,
          scryfallUrl: card.scryfall_uri || ''
        };
      } catch (err) {
        console.error('Scryfall fetch error:', err);
        return null;
      }
    }

    function openCommanderModalFromClient() {
      if (!selectedPlayerId || !gameState.players[selectedPlayerId]) return;
      const info = gameState.players[selectedPlayerId].commanderInfo;
      if (info) {
        showCardModal(info);
      }
    }

    function showCardModal(info) {
      modalCardTitle.textContent = info.name || '不明なカード';
      modalCardType.textContent = info.typeLine || '';
      modalCardText.textContent = info.text || '能力テキストはありません。';
      if (info.imageUrl) {
        modalCardImg.src = info.imageUrl;
        modalCardImg.style.display = 'block';
      } else {
        modalCardImg.style.display = 'none';
      }
      cardModalBackdrop.classList.add('active');
    }

    function closeCardModal(e) {
      if (e && e.target !== cardModalBackdrop && !e.target.classList.contains('card-modal-close')) return;
      cardModalBackdrop.classList.remove('active');
    }

    function buildCommanderDamagePanel() {
      commanderDamagePanel.innerHTML = '';
      if (!selectedPlayerId) return;

      const count = gameState.activePlayerCount || 4;
      const p = gameState.players[selectedPlayerId];
      if (!p) return;

      for (let i = 1; i <= count; i++) {
        if (i !== selectedPlayerId) {
          const opp = gameState.players[i];
          const opponentName = opp?.name || `Player ${i}`;
          const currentDmg = (p.commanderDamage && p.commanderDamage[i]) || 0;
          const oppCmd = opp?.commanderInfo;
          const hasOppCmd = oppCmd && oppCmd.name;

          const row = document.createElement('div');
          row.className = 'sub-control-row';
          row.style.flexDirection = 'column';
          row.style.alignItems = 'stretch';
          row.style.gap = '0.5rem';

          let oppCmdHtml = '';
          if (hasOppCmd) {
            oppCmdHtml = `
              <div class="opponent-commander-badge" onclick="showCardModalByPlayerId(${i})" title="タップして統率者カード詳細を確認">
                <img class="opponent-commander-thumb" src="${oppCmd.imageUrl || ''}" alt="">
                <span class="opponent-commander-name">${oppCmd.name}</span>
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </div>
            `;
          }

          row.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <div>
                <span class="sub-control-label" id="cmd-label-${i}">vs ${opponentName}</span>
                ${oppCmdHtml}
              </div>
              <div class="sub-control-btns">
                <button class="btn-small-pad" onclick="changeCommanderDamage(${i}, -1)" style="color: var(--accent-rose);">-</button>
                <span class="sub-control-val" id="cmd-val-${i}">${currentDmg}</span>
                <button class="btn-small-pad" onclick="changeCommanderDamage(${i}, 1)" style="color: var(--accent-emerald);">+</button>
              </div>
            </div>
          `;
          commanderDamagePanel.appendChild(row);
        }
      }
    }

    function showCardModalByPlayerId(playerId) {
      if (gameState.players[playerId] && gameState.players[playerId].commanderInfo) {
        showCardModal(gameState.players[playerId].commanderInfo);
      }
    }

    function toggleAccordion() {
      const content = document.getElementById('accordionContent');
      const header = document.getElementById('accordionHeader');
      const arrow = document.getElementById('accordionArrow');

      content.classList.toggle('open');
      header.classList.toggle('active');

      if (content.classList.contains('open')) {
        arrow.style.transform = 'rotate(180deg)';
      } else {
        arrow.style.transform = '';
      }
    }
  </script>
</body>
</html>
